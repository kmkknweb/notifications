<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWA Push Notification</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
      --accent: #7c6af7; --accent-glow: rgba(124,106,247,0.3);
      --green: #4ade80; --red: #f87171; --text: #e2e8f0; --muted: #64748b;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(124,106,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(99,179,237,0.06) 0%, transparent 50%);
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 480px;
      display: flex; flex-direction: column; gap: 24px;
    }
    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
    h1 span { color: var(--accent); }
    .status-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px; font-size: 0.875rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
    .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.red { background: var(--red); }
    .btn { padding: 12px 20px; border-radius: 10px; border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; width: 100%; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #6a58e0; box-shadow: 0 0 20px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    .divider { height: 1px; background: var(--border); }
    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: -12px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    input, textarea {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; color: var(--text); font-size: 0.875rem;
      font-family: inherit; transition: border-color 0.2s; resize: none;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    .log {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; font-size: 0.8rem; color: var(--muted);
      font-family: monospace; min-height: 60px; max-height: 120px; overflow-y: auto; line-height: 1.6;
    }
    .log .ok { color: var(--green); }
    .log .err { color: var(--red); }
  </style>
</head>
<body>
<div class="card">
  <h1>PWA <span>Push</span> Notification</h1>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <div class="status-row"><div class="dot" id="dot-sw"></div><span id="status-sw">กำลังโหลด...</span></div>
    <div class="status-row"><div class="dot" id="dot-push"></div><span id="status-push">ยังไม่ได้ขอ Permission</span></div>
  </div>
  <button class="btn btn-primary" id="btn-subscribe" disabled>🔔 เปิดรับ Notification</button>
  <div class="divider"></div>
  <p class="section-title">ทดสอบส่ง Notification</p>
  <div class="input-group">
    <input type="text" id="notif-title" placeholder="หัวข้อ" value="ทดสอบระบบ" />
    <textarea id="notif-body" rows="2" placeholder="ข้อความ">นี่คือ Push Notification ทดสอบ 🎉</textarea>
  </div>
  <button class="btn btn-outline" id="btn-send" disabled>📤 ส่ง Notification</button>
  <div class="log" id="log">รอการเชื่อมต่อ...</div>
</div>
<script>
  const VAPID_PUBLIC_KEY = 'BClrlIsycnGqCbfjt3DBcG6ER2CLWNVboIGBUzXv4JI3ksH263ZhFX8L0nCnltG4NWSNRDhKc1Sc5_7pkiYYerE';
  const API_BASE = 'https://notifications-ebon.vercel.app';

  const log = (msg, type = '') => {
    const el = document.getElementById('log');
    const line = document.createElement('div');
    line.className = type;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  };

  const setStatus = (id, dotId, text, color) => {
    document.getElementById(id).textContent = text;
    document.getElementById(dotId).className = 'dot ' + color;
  };

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
  }

  let swReg = null;

  async function init() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      setStatus('status-sw', 'dot-sw', 'Browser ไม่รองรับ', 'red');
      return;
    }
    try {
      swReg = await navigator.serviceWorker.register('/sw.js');
      setStatus('status-sw', 'dot-sw', 'Service Worker พร้อมใช้งาน ✓', 'green');
      log('Service Worker ลงทะเบียนสำเร็จ', 'ok');
      if (Notification.permission === 'granted') {
        setStatus('status-push', 'dot-push', 'เปิดรับ Notification แล้ว ✓', 'green');
        document.getElementById('btn-subscribe').textContent = '✓ เปิดรับแล้ว';
        document.getElementById('btn-send').disabled = false;
      }
      document.getElementById('btn-subscribe').disabled = false;
    } catch (err) {
      setStatus('status-sw', 'dot-sw', 'Service Worker ล้มเหลว', 'red');
      log('Error: ' + err.message, 'err');
    }
  }

  document.getElementById('btn-subscribe').addEventListener('click', async () => {
    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') { log('User ไม่อนุญาต', 'err'); return; }


      const oldSubscription = await swReg.pushManager.getSubscription();

if (oldSubscription) {
  await oldSubscription.unsubscribe();
  log('ลบ subscription เก่าแล้ว', 'ok');
}

const subscription = await swReg.pushManager.subscribe({
  userVisibleOnly: true,
  applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
});


      
      await fetch(`${API_BASE}/api/send-notification?action=subscribe`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(subscription),
      });
      setStatus('status-push', 'dot-push', 'เปิดรับ Notification แล้ว ✓', 'green');
      document.getElementById('btn-subscribe').textContent = '✓ เปิดรับแล้ว';
      document.getElementById('btn-send').disabled = false;
      log('Subscribe สำเร็จ!', 'ok');
    } catch (err) {
      log('Subscribe ล้มเหลว: ' + err.message, 'err');
    }
  });

  document.getElementById('btn-send').addEventListener('click', async () => {
    const title = document.getElementById('notif-title').value || 'ทดสอบ';
    const body = document.getElementById('notif-body').value || 'ข้อความทดสอบ';
    try {
      const res = await fetch(`${API_BASE}/api/send-notification?action=send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body }),
      });
      const data = await res.json();
      log(`ส่งสำเร็จ ${data.sent} คน, ล้มเหลว ${data.failed} คน`, data.failed > 0 ? 'err' : 'ok');
    } catch (err) {
      log('ส่งไม่ได้: ' + err.message, 'err');
    }
  });

  init();
</script>
</body>
</html>
